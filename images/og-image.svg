<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05080f"/>
      <stop offset="100%" stop-color="#0d1f2d"/>
    </linearGradient>
    <!-- Teal glow left -->
    <radialGradient id="glowLeft" cx="20%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1F7A8C" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1F7A8C" stop-opacity="0"/>
    </radialGradient>
    <!-- Teal glow right -->
    <radialGradient id="glowRight" cx="85%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#3dd6f5" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3dd6f5" stop-opacity="0"/>
    </radialGradient>
    <!-- Card gradient -->
    <linearGradient id="cardBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F7A8C" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <!-- Shimmer line -->
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3dd6f5" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3dd6f5" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#3dd6f5" stop-opacity="0"/>
    </linearGradient>
    <!-- Text gradient (yellow-orange) -->
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <!-- Clip for rounded card -->
    <clipPath id="cardClip">
      <rect x="60" y="60" width="1080" height="510" rx="28"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowLeft)"/>
  <rect width="1200" height="630" fill="url(#glowRight)"/>

  <!-- Grid lines subtle -->
  <g opacity="0.03" stroke="#3dd6f5" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Main card -->
  <rect x="60" y="60" width="1080" height="510" rx="28" fill="url(#cardBg)" stroke="#3dd6f5" stroke-opacity="0.18" stroke-width="1.5"/>
  <!-- Shimmer top line -->
  <rect x="60" y="60" width="1080" height="1.5" rx="1" fill="url(#shimmer)"/>

  <!-- Corner glow circle top-right -->
  <circle cx="1140" cy="90" r="180" fill="#3dd6f5" fill-opacity="0.06"/>

  <!-- Logo row -->
  <text x="100" y="148" font-family="Arial, sans-serif" font-weight="700" font-size="26" fill="#e8f0fe" letter-spacing="0.5">Revamp</text>
  <text x="222" y="148" font-family="Arial, sans-serif" font-weight="700" font-size="26" fill="#3dd6f5" letter-spacing="0.5"> Digital</text>
  <!-- Tag pill -->
  <rect x="348" y="124" width="116" height="28" rx="14" fill="#3dd6f5" fill-opacity="0.12" stroke="#3dd6f5" stroke-opacity="0.3" stroke-width="1"/>
  <text x="406" y="143" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#3dd6f5" text-anchor="middle" letter-spacing="1.5">AI-POWERED</text>

  <!-- Divider -->
  <rect x="100" y="165" width="280" height="1" fill="#3dd6f5" fill-opacity="0.2"/>

  <!-- Main headline -->
  <text x="100" y="260" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="64" fill="url(#textGrad)" letter-spacing="-1">Your Website.</text>
  <text x="100" y="340" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="64" fill="#e8f0fe" letter-spacing="-1">Revamped. Free.</text>

  <!-- Sub text -->
  <text x="100" y="398" font-family="Arial, sans-serif" font-size="24" fill="#e8f0fe" fill-opacity="0.5">We turn local business websites into</text>
  <text x="100" y="428" font-family="Arial, sans-serif" font-size="24" fill="#e8f0fe" fill-opacity="0.5">customer-generating machines.</text>

  <!-- CTA pill -->
  <rect x="100" y="460" width="310" height="56" rx="14" fill="#1F7A8C"/>
  <rect x="100" y="460" width="310" height="56" rx="14" fill="#15606e"/>
  <text x="255" y="494" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">Get Free Preview in 48hrs →</text>

  <!-- Right side stats panel -->
  <rect x="760" y="130" width="330" height="330" rx="20" fill="#ffffff" fill-opacity="0.03" stroke="#3dd6f5" stroke-opacity="0.12" stroke-width="1"/>

  <!-- Stat 1 -->
  <text x="925" y="210" font-family="Arial Black, Arial, sans-serif" font-size="52" font-weight="900" fill="url(#textGrad)" text-anchor="middle">13+</text>
  <text x="925" y="238" font-family="Arial, sans-serif" font-size="13" fill="#e8f0fe" fill-opacity="0.4" text-anchor="middle" letter-spacing="2">SITES REVAMPED</text>
  <!-- divider -->
  <rect x="800" y="255" width="250" height="1" fill="#3dd6f5" fill-opacity="0.1"/>

  <!-- Stat 2 -->
  <text x="925" y="320" font-family="Arial Black, Arial, sans-serif" font-size="52" font-weight="900" fill="url(#textGrad)" text-anchor="middle">48hr</text>
  <text x="925" y="348" font-family="Arial, sans-serif" font-size="13" fill="#e8f0fe" fill-opacity="0.4" text-anchor="middle" letter-spacing="2">REVAMP PREVIEW</text>
  <!-- divider -->
  <rect x="800" y="365" width="250" height="1" fill="#3dd6f5" fill-opacity="0.1"/>

  <!-- Stat 3 -->
  <text x="925" y="428" font-family="Arial Black, Arial, sans-serif" font-size="52" font-weight="900" fill="url(#textGrad)" text-anchor="middle">$0</text>
  <text x="925" y="456" font-family="Arial, sans-serif" font-size="13" fill="#e8f0fe" fill-opacity="0.4" text-anchor="middle" letter-spacing="2">TO SEE IT FIRST</text>

  <!-- Bottom domain -->
  <text x="1140" y="548" font-family="Arial, sans-serif" font-size="18" fill="#3dd6f5" fill-opacity="0.5" text-anchor="end">gorevamp.ai</text>
</svg>
